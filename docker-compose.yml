version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mindpulse-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: mindpulse
      POSTGRES_USER: mindpulse_user
      POSTGRES_PASSWORD: mindpulse_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindpulse_user -d mindpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
